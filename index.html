<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoggoClients | Modern Minecraft Mods</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/11.0.8/framer-motion.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-slim@2.12.0/tsparticles.slim.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Mouse Glow Effect */
        #mouse-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle 400px at var(--x) var(--y), rgba(59, 130, 246, 0.07), transparent 80%);
            z-index: -1;
            pointer-events: none;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .smooth-card {
            border-radius: 2rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .smooth-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255, 255, 255, 0.06);
        }

        #tsparticles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #333;
        }

        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
    <div id="mouse-glow"></div>
    <div id="tsparticles"></div>

    <nav class="fixed top-0 w-full z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center glass px-8 py-4 rounded-full">
            <div class="text-2xl font-bold gradient-text">DoggoClients</div>
            <div class="space-x-8 hidden md:flex">
                <a href="#" class="hover:text-blue-400 transition">Home</a>
                <a href="#mods" class="hover:text-blue-400 transition">Mods</a>
            </div>
        </div>
    </nav>

    <main class="relative pt-32 px-6">
        <!-- Hero Section -->
        <section class="max-w-7xl mx-auto text-center py-20">
            <h1 class="text-6xl md:text-8xl font-extrabold mb-6 tracking-tight">
                What better way to <span class="gradient-text">win?</span> Experience
            </h1>
            <p class="text-gray-400 text-xl md:text-2xl max-w-2xl mx-auto mb-10 leading-relaxed">
                The most undetectable ghost clients to gain an advantage over your opponent for absolutely free.
            </p>
            <div class="flex flex-col md:flex-row justify-center gap-4">
                <a href="#mods" class="bg-white text-black px-10 py-4 rounded-full font-bold text-lg hover:bg-gray-200 transition text-center">Browse Mods</a>
            </div>
        </section>

        <!-- Mods Grid -->
        <section id="mods" class="max-w-7xl mx-auto py-20">
            <h2 class="text-4xl font-bold mb-12 text-center">Available <span class="gradient-text">Mods</span></h2>
            <div id="mod-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Mods will be injected here by JavaScript -->
            </div>
        </section>
    </main>

    <footer class="py-20 text-center text-gray-500 border-t border-white/5 mt-20">
        <p>&copy; Built by doggo for a better experience - 2026</p>
    </footer>

    <script>
        // Mod Data Structure
        const mods = [
            {
                name: "Myau Client",
                description: "Lightweight Minecraft client with optimized performance and custom features.",
                version: "250910+9",
                mcVersion: "1.8.9",
                color: "blue",
                icon: "m8 3 4 8 5-5 5 15H2L8 3z",
                downloadUrl: "https://raw.githubusercontent.com/epicgamesdontban1-hash/doggoclients/main/Myau-250910%2B9.jar"
            },
            {
                name: "Raven N+ Lite",
                description: "Advanced client with anti-cheat bypass and performance enhancements.",
                version: "Lite",
                mcVersion: "1.8.9",
                color: "purple",
                icon: "M12 2v20M2 12h20",
                downloadUrl: "https://raw.githubusercontent.com/epicgamesdontban1-hash/doggoclients/main/Raven-N%2B-Lite-Client-1.8.9.jar"
            },
            {
                name: "Better Keystrokes",
                description: "Enhanced key display mod for better gameplay tracking.",
                version: "V-1.2",
                mcVersion: "1.8.9",
                color: "green",
                icon: "M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z",
                downloadUrl: "https://raw.githubusercontent.com/epicgamesdontban1-hash/doggoclients/main/%5B1.8.9%5D%20BetterKeystrokes%20V-1.2.jar"
            },
            {
                name: "Raven A+",
                description: "Premium client with advanced features and optimizations.",
                version: "A+",
                mcVersion: "1.8.9",
                color: "orange",
                icon: "M13 2 3 14h9l-1 8 10-12h-9l1-8z",
                downloadUrl: "https://raw.githubusercontent.com/epicgamesdontban1-hash/doggoclients/main/raven-Aplus.jar"
            }
        ];

        function renderMods() {
            const container = document.getElementById('mod-container');
            container.innerHTML = mods.map((mod, i) => `
                <div class="glass smooth-card p-8 group opacity-0 translate-y-5" style="transition-delay: ${i * 100}ms">
                    <div class="w-16 h-16 bg-${mod.color}-500/20 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-${mod.color}-500/30 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-${mod.color}-400">
                            <path d="${mod.icon}"/>
                        </svg>
                    </div>
                    <h3 class="text-2xl font-bold mb-3">${mod.name}</h3>
                    <p class="text-gray-400 mb-6">${mod.description}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-mono text-${mod.color}-400">${mod.version} • ${mod.mcVersion}</span>
                        <a href="${mod.downloadUrl}" class="bg-white/10 hover:bg-white text-white hover:text-black px-5 py-2 rounded-full text-sm font-bold transition">Download</a>
                    </div>
                </div>
            `).join('');

            // Trigger animations
            setTimeout(() => {
                document.querySelectorAll('.smooth-card').forEach(card => {
                    card.classList.remove('opacity-0', 'translate-y-5');
                    card.classList.add('opacity-100', 'translate-y-0');
                });
            }, 100);
        }

        // Initialize
        renderMods();

        // Mouse Glow & Parallax Logic
        const glow = document.getElementById('mouse-glow');
        const hero = document.querySelector('h1');
        
        window.addEventListener('mousemove', (e) => {
            glow.style.setProperty('--x', `${e.clientX}px`);
            glow.style.setProperty('--y', `${e.clientY}px`);
            
            // Subtle Hero Parallax
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            hero.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        // Particles Configuration - Enhanced Geometric Lines
        tsParticles.load("tsparticles", {
            fpsLimit: 120,
            interactivity: {
                events: {
                    onClick: { enable: true, mode: "push" },
                    onHover: { enable: true, mode: ["repulse", "connect"] },
                    resize: true,
                },
                modes: {
                    push: { quantity: 6 },
                    repulse: { distance: 120, duration: 0.5 },
                    connect: { distance: 180, links: { opacity: 0.3 } },
                },
            },
            particles: {
                color: { value: "#60a5fa" },
                links: {
                    color: "#ffffff",
                    distance: 180,
                    enable: true,
                    opacity: 0.25,
                    width: 2,
                    triangles: { enable: true, opacity: 0.05, color: "#60a5fa" },
                },
                move: {
                    direction: "none",
                    enable: true,
                    outModes: { default: "bounce" },
                    random: true,
                    speed: 0.8,
                    straight: false,
                    attract: { enable: false, rotateX: 600, rotateY: 1200 },
                },
                number: {
                    density: { enable: true, area: 800 },
                    value: 60,
                },
                opacity: { value: 0.3, animation: { enable: true, speed: 1, minimumValue: 0.1, sync: false } },
                shape: {
                    type: ["triangle", "polygon"],
                    polygon: { sides: 6 }
                },
                size: { value: { min: 2, max: 5 }, animation: { enable: true, speed: 2, minimumValue: 1, sync: false } },
                rotate: { value: 0, animation: { enable: true, speed: 5, direction: "random" } },
            },
            detectRetina: true,
        });
    </script>
</body>
</html>
